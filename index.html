<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>认知压力任务</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>认知压力任务</h1>
      <nav class="pagination" role="tablist">
        <button class="page-btn active" data-page="1" role="tab" aria-selected="true">
          任务 1 · 心算减法
        </button>
        <button class="page-btn" data-page="2" role="tab" aria-selected="false">
          任务 2 · 双任务 2-back
        </button>
        <button class="page-btn" data-page="3" role="tab" aria-selected="false">
          任务 3 · 表情模仿
        </button>
      </nav>
    </header>

    <!-- Task 1: Mental Arithmetic -->
    <section id="task1" class="task-page active" role="tabpanel">
      <div class="task-header">
        <h2>心算减法任务</h2>
        <p class="task-desc">将当前数字减去 13，在 5 秒内输入答案并回车确认</p>
      </div>

      <div class="task1-body">
        <div class="session-row">
          <span class="session-label">任务剩余</span>
          <div class="session-bar-wrap">
            <div class="session-bar" id="t1-session-bar"></div>
          </div>
          <span class="session-time" id="t1-session-label">2:00</span>
        </div>

        <div class="number-display" id="t1-number">----</div>

        <div class="timer-bar-wrap">
          <div class="timer-bar" id="t1-timer-bar"></div>
        </div>
        <div class="timer-label" id="t1-timer-label">5.0s</div>

        <div class="input-row">
          <input
            type="number"
            id="t1-input"
            class="answer-input"
            placeholder="输入答案"
            autocomplete="off"
            inputmode="numeric"
            disabled
          />
          <button type="button" class="confirm-btn" id="t1-confirm" disabled>确认</button>
        </div>

        <div class="stats-row">
          <span>正确：<strong id="t1-correct">0</strong></span>
          <span>错误：<strong id="t1-wrong">0</strong></span>
        </div>
      </div>

      <div class="start-panel" id="t1-start-panel">
        <button type="button" class="start-btn" id="t1-start">开始任务</button>
      </div>

      <div class="overlay hidden" id="t1-overlay" aria-hidden="true">
        <div class="red-cross" aria-label="回答错误">✕</div>
        <p class="overlay-text">错误 / 超时</p>
      </div>

      <div class="summary-overlay hidden" id="t1-summary" aria-hidden="true">
        <div class="summary-card">
          <h3>任务结束</h3>
          <p class="summary-stat">回答正确：<strong id="t1-summary-correct">0</strong> 次</p>
          <p class="summary-stat">回答错误：<strong id="t1-summary-wrong">0</strong> 次</p>
          <button type="button" class="confirm-btn" id="t1-summary-btn">确定</button>
        </div>
      </div>
    </section>

    <!-- Task 2: Dual 2-back -->
    <section id="task2" class="task-page" role="tabpanel" hidden>
      <div class="task-header">
        <h2>双任务2-back</h2>
      </div>

      <div class="task2-body">
        <div class="session-row">
          <span class="session-label">任务剩余</span>
          <div class="session-bar-wrap">
            <div class="session-bar session-bar--blue" id="t2-session-bar"></div>
          </div>
          <span class="session-time" id="t2-session-label">2:00</span>
        </div>

        <div class="dual-cards">
          <div class="stimulus-card letter-card">
            <span class="card-label">字母</span>
            <span class="card-value" id="t2-letter">—</span>
          </div>
          <div class="stimulus-card digit-card">
            <span class="card-label">数字</span>
            <span class="card-value" id="t2-digit">—</span>
          </div>
        </div>

        <div class="timer-bar-wrap">
          <div class="timer-bar timer-bar--blue" id="t2-timer-bar"></div>
        </div>
        <div class="timer-label" id="t2-timer-label">3.0s</div>

        <div class="stats-row">
          <span>正确轮次：<strong id="t2-correct">0</strong></span>
          <span>错误：<strong id="t2-wrong">0</strong></span>
        </div>
      </div>

      <div class="start-panel" id="t2-start-panel">
        <button type="button" class="start-btn" id="t2-start">开始任务</button>
      </div>

      <div class="overlay hidden" id="t2-overlay" aria-hidden="true">
        <div class="red-cross" aria-label="回答错误">✕</div>
        <p class="overlay-text">漏按 / 错按</p>
      </div>

      <div class="summary-overlay hidden" id="t2-summary" aria-hidden="true">
        <div class="summary-card">
          <h3>任务结束</h3>
          <p class="summary-stat">回答正确：<strong id="t2-summary-correct">0</strong> 次</p>
          <p class="summary-stat">回答错误：<strong id="t2-summary-wrong">0</strong> 次</p>
          <button type="button" class="confirm-btn" id="t2-summary-btn">确定</button>
        </div>
      </div>
    </section>

    <!-- Task 3: Expression Imitation -->
    <section id="task3" class="task-page" role="tabpanel" hidden>
      <div class="task-header">
        <h2>表情模仿</h2>
      </div>

      <div class="task3-body">
        <p class="task3-instruction">
          请模仿图中人物愤怒的表情，并回想会让你愤怒的事情
        </p>

        <div class="task3-image-wrap">
          <img src="angry.jpg" alt="愤怒表情参考图" class="task3-image" />
        </div>

        <div class="timer-bar-wrap">
          <div class="timer-bar timer-bar--amber" id="t3-timer-bar"></div>
        </div>
        <div class="timer-label" id="t3-timer-label">2:00</div>
      </div>

      <div class="start-panel" id="t3-start-panel">
        <button type="button" class="start-btn" id="t3-start">开始任务</button>
      </div>

      <div class="overlay hidden" id="t3-overlay" aria-hidden="true">
        <p class="overlay-text overlay-text--done">时间到</p>
      </div>
    </section>
  </div>

  <script src="js/sounds.js"></script>
  <script src="js/session.js"></script>
  <script src="js/task1.js"></script>
  <script src="js/task2.js"></script>
  <script src="js/task3.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
